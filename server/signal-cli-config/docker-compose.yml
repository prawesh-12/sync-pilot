# add the latest one from: https://github.com/bbernhard/signal-cli-rest-api
services:
  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: signal-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    # native keeps GET /v1/receive as plain HTTP, which the cron poller needs;
    # json-rpc turns it into a WebSocket-only endpoint and breaks polling. The
    # old native lock contention is now avoided by polling only users with a
    # pending draft and removing duplicate Signal numbers.
    environment:
      MODE: native
    volumes:
      - ./signal-cli-config:/home/.local/share/signal-cli
